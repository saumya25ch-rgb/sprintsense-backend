# GitHub Models configuration (loaded only when spring.profiles.active=github).
# GitHub Models exposes an OpenAI-compatible API, so we use Spring AI's OpenAI
# starter pointed at the GitHub Models endpoint with a GitHub PAT as the key.
#
# To use: export GITHUB_TOKEN=<your PAT with models:read scope>
# Then run: ./mvnw spring-boot:run -Dspring-boot.run.profiles=github

spring.ai.openai.base-url=https://models.github.ai/inference
spring.ai.openai.chat.completions-path=/chat/completions
spring.ai.openai.api-key=${GITHUB_TOKEN}

# GitHub Models uses <publisher>/<model> naming. gpt-4o-mini is in the "low"
# rate-limit tier (most generous on the free tier) and is plenty strong for
# sprint-retro analysis. Override with GITHUB_MODEL to try larger models.
spring.ai.openai.chat.options.model=${GITHUB_MODEL:openai/gpt-4o-mini}
# temperature=0 for deterministic structured extraction; less creative
# "fill the schema with plausible content when nothing is there" behavior.
spring.ai.openai.chat.options.temperature=0

spring.ai.model.chat=openai
spring.ai.model.embedding=none
