spring.application.name=backend

# Defaults to 'mock' so the app boots without AI credentials.
# Switch to live AI with: --spring.profiles.active=github
spring.profiles.active=mock

# Bind to the port the host provides (Render sets PORT, locally we use 8080).
server.port=${PORT:8080}

# CORS allowlist: comma-separated. Override on Render via the env var
# SPRINTSENSE_CORS_ALLOWED_ORIGINS=https://your-frontend.vercel.app,http://localhost:5173
sprintsense.cors.allowed-origins=http://localhost:5173

# Error response policy: never leak stack traces or internal messages to clients.
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-exception=false
server.error.include-binding-errors=never

# Rate limit for /api/ai/* (requests per minute, per IP). Override via
# SPRINTSENSE_RATELIMIT_REQUESTS_PER_MINUTE.
sprintsense.ratelimit.requests-per-minute=30
